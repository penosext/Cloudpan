<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POSC资源站 | 资源中心</title>
  <script src="./js/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <!-- 右下角浮动按钮 -->
  <div class="floating-buttons">
    <button class="floating-btn theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <i class="fas fa-sun"></i>
      <i class="fas fa-moon"></i>
    </button>
    <button class="floating-btn back-to-top" id="back-to-top" onclick="scrollToTop()" aria-label="回到顶部">
      <i class="fas fa-arrow-up"></i>
    </button>
  </div>

  <header class="site-badge">
    <div class="logo-wrapper">
      <div class="logo-icon"><i class="fas fa-cloud"></i></div>
    </div>
    <div>
      <h1>POSC资源站</h1>
      <p class="subtitle">
      <i class="fab fa-github"></i>
      <span id="github-stars">0</span> stars · 
      <span id="github-forks">0</span> forks
      </p>
    </div>
  </header>

  <div class="container app-layout">
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="release-count">0</div>
        <div class="stat-label">资源发布</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="file-count">0</div>
        <div class="stat-label">文件总数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="user-count">0</div>
        <div class="stat-label">Stars</div>
      </div>
    </div>

    <div class="announcement-card">
      <div class="announcement-header">
        <h2 class="announcement-title"><i class="fas fa-bullhorn"></i> 最新公告</h2>
        <button class="btn-refresh" onclick="fetchAnnouncement()"><i class="fas fa-sync-alt"></i> 刷新</button>
      </div>
      <div id="announcement-content"><div class="loading"><div class="spinner"></div>加载中...</div></div>
    </div>

    <aside class="file-sidebar">
      <div class="card file-card">
        <h2 class="section-title"><i class="fas fa-box-open"></i> 文件发布</h2>
        <div class="search-wrapper">
          <input type="text" id="file-search" class="search-input" placeholder="搜索文件名...">
          <i class="fas fa-search search-icon"></i>
        </div>
        <div id="search-results-info" class="search-info">
          <span id="search-count"></span>
          <button class="btn-clear-search" onclick="clearSearch()"><i class="fas fa-times"></i> 清除</button>
        </div>
        <div id="releases"><div class="loading"><div class="spinner"></div>加载中...</div></div>
        <div id="no-results" class="no-results">
          <i class="fas fa-search"></i>
          <h3>未找到匹配的文件</h3>
          <p>请尝试使用其他关键词搜索</p>
        </div>
      </div>
    </aside>

    <div class="card discussion-card">
      <h2 class="section-title"><i class="fas fa-comments"></i> 社区讨论</h2>
      <div class="create-discussion">
        <h3 style="font-weight:500;margin-bottom:16px;"><i class="fas fa-pen"></i> 新建讨论</h3>
        <input type="text" id="issueTitle" class="form-input" placeholder="讨论标题（必填）">
        <textarea id="issueBody" class="form-textarea" placeholder="讨论内容（支持Markdown）" rows="4"></textarea>
        <button class="btn-submit" onclick="createNewIssue()"><i class="fas fa-plus-circle"></i> 创建</button>
      </div>
      <div id="discussions"><div class="loading"><div class="spinner"></div>加载中...</div></div>
    </div>

    <div class="disclaimer">
      <strong><i class="fas fa-exclamation-circle"></i> 免责声明：</strong>
      本站所有资源均来自网络，下载仅供学习交流，不得用于商业用途。如需删除内容，请联系 wyxdlz54188
    </div>

    <div class="footer"><p>&copy; 2025 POSC</p></div>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
