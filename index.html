<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POSC资源站 | 资源中心</title>
  <script src="./js/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ========== CSS 变量 - 蓝色主题 ========== */
    :root {
      /* 主色调 - 蓝色系 */
      --primary: #0067C0;
      --on-primary: #FFFFFF;
      --primary-container: #D3E5FF;
      --on-primary-container: #001D36;
      
      /* 次要色 */
      --secondary: #535F70;
      --on-secondary: #FFFFFF;
      --secondary-container: #D7E3F7;
      --on-secondary-container: #101C2B;
      
      /* 第三色 */
      --tertiary: #006C52;
      --on-tertiary: #FFFFFF;
      --tertiary-container: #7EF8D2;
      --on-tertiary-container: #002116;
      
      /* 错误色 */
      --error: #BA1A1A;
      --on-error: #FFFFFF;
      --error-container: #FFDAD6;
      --on-error-container: #410002;
      
      /* 表面色 - 白色背景系列 */
      --surface: #FFFFFF;
      --on-surface: #1A1C1E;
      --surface-variant: #DFE2EB;
      --on-surface-variant: #43474E;
      
      /* 背景色 - 白色 */
      --background: #F8F9FF;
      --on-background: #1A1C1E;
      
      /* 轮廓色 */
      --outline: #74777F;
      --outline-variant: #C4C6D0;
      
      /* 表面容器 */
      --surface-container-lowest: #FFFFFF;
      --surface-container-low: #F3F5FA;
      --surface-container: #EDEFF5;
      --surface-container-high: #E7E9F0;
      --surface-container-highest: #E2E4EA;
      
      /* 阴影 */
      --elevation-1: 0 1px 2px rgba(0, 0, 0, 0.03), 0 1px 3px 1px rgba(0, 0, 0, 0.05);
      --elevation-2: 0 1px 2px rgba(0, 0, 0, 0.05), 0 2px 6px 2px rgba(0, 0, 0, 0.03);
      --elevation-3: 0 1px 3px rgba(0, 0, 0, 0.05), 0 4px 8px 3px rgba(0, 0, 0, 0.04);
      --elevation-4: 0 2px 3px rgba(0, 0, 0, 0.05), 0 6px 10px 4px rgba(0, 0, 0, 0.04);
      --elevation-5: 0 4px 4px rgba(0, 0, 0, 0.05), 0 8px 12px 6px rgba(0, 0, 0, 0.04);
      
      /* 圆角 */
      --radius-xs: 4px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-xxl: 28px;
      --radius-full: 9999px;
      
      /* 间距 */
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --spacing-xxl: 48px;
      
      /* 过渡 */
      --transition-duration: 0.2s;
      --transition-timing: cubic-bezier(0.4, 0, 0.2, 1);
      
      /* 图标大小 */
      --icon-size-sm: 18px;
      --icon-size-md: 24px;
      --icon-size-lg: 32px;
    }

    /* ========== 暗色主题 ========== */
    [data-theme="dark"] {
      --primary: #A8C8FF;
      --on-primary: #003059;
      --primary-container: #00497E;
      --on-primary-container: #D3E5FF;
      
      --secondary: #BBC7DB;
      --on-secondary: #253140;
      --secondary-container: #3B4858;
      --on-secondary-container: #D7E3F7;
      
      --tertiary: #61DBB6;
      --on-tertiary: #003828;
      --tertiary-container: #00513D;
      --on-tertiary-container: #7EF8D2;
      
      --error: #FFB4AB;
      --on-error: #690005;
      --error-container: #93000A;
      --on-error-container: #FFDAD6;
      
      --surface: #121316;
      --on-surface: #E2E2E5;
      --surface-variant: #43474E;
      --on-surface-variant: #C4C6D0;
      
      --background: #121316;
      --on-background: #E2E2E5;
      
      --outline: #8E9199;
      --outline-variant: #43474E;
      
      --surface-container-lowest: #0A0A0D;
      --surface-container-low: #1A1C1E;
      --surface-container: #1E2023;
      --surface-container-high: #282A2E;
      --surface-container-highest: #333539;
      
      --elevation-1: 0 1px 2px rgba(0, 0, 0, 0.2), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
      --elevation-2: 0 1px 2px rgba(0, 0, 0, 0.25), 0 2px 6px 2px rgba(0, 0, 0, 0.2);
      --elevation-3: 0 1px 3px rgba(0, 0, 0, 0.25), 0 4px 8px 3px rgba(0, 0, 0, 0.2);
      --elevation-4: 0 2px 3px rgba(0, 0, 0, 0.25), 0 6px 10px 4px rgba(0, 0, 0, 0.2);
      --elevation-5: 0 4px 4px rgba(0, 0, 0, 0.25), 0 8px 12px 6px rgba(0, 0, 0, 0.2);
    }

    /* ========== 基础重置 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--background);
      color: var(--on-background);
      font-family: 'Roboto', 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background-color var(--transition-duration) var(--transition-timing),
                  color var(--transition-duration) var(--transition-timing);
      overflow-x: hidden;
    }

    /* ========== 主题切换按钮 ========== */
    .theme-switcher {
      position: fixed;
      top: var(--spacing-md);
      right: var(--spacing-md);
      z-index: 1000;
    }

    .theme-toggle {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      background: var(--surface-container-highest);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--elevation-3);
      transition: all var(--transition-duration) var(--transition-timing);
      position: relative;
      overflow: hidden;
      color: var(--on-surface-variant);
    }

    .theme-toggle:hover {
      background: var(--surface-container-high);
      box-shadow: var(--elevation-4);
    }

    .theme-toggle::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--on-surface);
      opacity: 0;
      transition: opacity var(--transition-duration) var(--transition-timing);
    }

    .theme-toggle:hover::before {
      opacity: 0.08;
    }

    .theme-toggle i {
      font-size: 22px;
      transition: transform 0.3s var(--transition-timing);
    }

    .theme-toggle .fa-sun {
      display: block;
    }

    .theme-toggle .fa-moon {
      display: none;
    }

    [data-theme="dark"] .theme-toggle .fa-sun {
      display: none;
    }

    [data-theme="dark"] .theme-toggle .fa-moon {
      display: block;
    }

    /* ========== 容器 ========== */
    .container {
      max-width: 840px;
      margin: 0 auto;
      padding: 0 var(--spacing-md);
      width: 100%;
    }

    /* ========== 头部 ========== */
    .header {
      text-align: center;
      padding: var(--spacing-xxl) 0 var(--spacing-xl);
    }

    .logo-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--spacing-md);
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-lg);
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--elevation-3);
    }

    .logo-icon i {
      font-size: 32px;
      color: var(--on-primary);
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 500;
      color: var(--on-background);
      letter-spacing: -0.5px;
    }

    .header .subtitle {
      font-size: 0.9rem;
      color: var(--on-surface-variant);
      margin-top: var(--spacing-xs);
    }

    /* ========== 统计栏 ========== */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: var(--spacing-xl);
      padding: var(--spacing-lg);
      background: var(--surface-container-low);
      border-radius: var(--radius-xl);
      margin-bottom: var(--spacing-lg);
      box-shadow: var(--elevation-1);
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--on-surface-variant);
      margin-top: var(--spacing-xs);
    }

    /* ========== 公告卡片 ========== */
    .announcement-card {
      background: var(--primary-container);
      border-radius: var(--radius-xl);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
      position: relative;
      overflow: hidden;
    }

    .announcement-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--primary);
      border-radius: 4px 4px 0 0;
    }

    .announcement-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-md);
      flex-wrap: wrap;
      gap: var(--spacing-sm);
    }

    .announcement-title {
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--on-primary-container);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: var(--radius-full);
      border: none;
      background: var(--primary);
      color: var(--on-primary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: var(--elevation-1);
      transition: all var(--transition-duration) var(--transition-timing);
    }

    .btn-refresh:hover {
      box-shadow: var(--elevation-3);
      opacity: 0.9;
    }

    .btn-refresh:active {
      box-shadow: var(--elevation-1);
    }

    .announcement-content {
      background: rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      color: var(--on-primary-container);
      line-height: 1.7;
    }

    [data-theme="dark"] .announcement-content {
      background: rgba(0, 0, 0, 0.2);
    }

    .announcement-content h1,
    .announcement-content h2,
    .announcement-content h3 {
      color: var(--on-primary-container);
      margin: var(--spacing-md) 0 var(--spacing-sm);
      font-weight: 500;
    }

    .announcement-content p {
      margin-bottom: var(--spacing-sm);
    }

    /* 去掉 Markdown 链接下划线 */
    .announcement-content a {
      color: var(--primary);
      font-weight: 500;
      text-decoration: none;
    }

    .announcement-content a:hover {
      text-decoration: none;
      opacity: 0.8;
    }

    .announcement-content code {
      background: rgba(0, 0, 0, 0.08);
      padding: 2px 8px;
      border-radius: var(--radius-xs);
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.85rem;
    }

    .announcement-content blockquote {
      border-left: 4px solid var(--primary);
      padding-left: var(--spacing-md);
      margin: var(--spacing-sm) 0;
      opacity: 0.9;
    }

    .announcement-content table {
      width: 100%;
      border-collapse: collapse;
      margin: var(--spacing-sm) 0;
    }

    .announcement-content th,
    .announcement-content td {
      padding: var(--spacing-sm);
      border: 1px solid rgba(0, 0, 0, 0.12);
      text-align: left;
    }

    .announcement-content th {
      background: rgba(0, 0, 0, 0.06);
    }

    .announcement-meta {
      margin-top: var(--spacing-md);
      padding-top: var(--spacing-sm);
      border-top: 1px solid rgba(0, 0, 0, 0.12);
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* ========== 区域标题 ========== */
    .section-title {
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--on-surface);
      margin-bottom: var(--spacing-lg);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .section-title i {
      color: var(--primary);
    }

    /* ========== 卡片容器 ========== */
    .card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
      box-shadow: var(--elevation-1);
      border: 1px solid var(--outline-variant);
    }

    /* ========== 搜索框 ========== */
    .search-wrapper {
      position: relative;
      margin-bottom: var(--spacing-lg);
    }

    .search-input {
      width: 100%;
      padding: var(--spacing-md) var(--spacing-lg);
      padding-right: 48px;
      border: 2px solid var(--outline-variant);
      border-radius: var(--radius-full);
      background: var(--surface-container-lowest);
      color: var(--on-surface);
      font-size: 0.95rem;
      transition: all var(--transition-duration) var(--transition-timing);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--primary);
      background: var(--surface);
    }

    .search-input::placeholder {
      color: var(--on-surface-variant);
    }

    .search-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--on-surface-variant);
      pointer-events: none;
    }

    .search-info {
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-sm) var(--spacing-md);
      margin-bottom: var(--spacing-sm);
      background: var(--surface-container);
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      color: var(--on-surface-variant);
    }

    .search-info.show {
      display: flex;
    }

    .btn-clear-search {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
    }

    .btn-clear-search:hover {
      opacity: 0.8;
    }

    /* ========== 文件列表 ========== */
    .release-item {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md) var(--spacing-lg);
      margin-bottom: var(--spacing-md);
      box-shadow: var(--elevation-1);
      border: 1px solid var(--outline-variant);
    }

    .release-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
    }

    .release-name {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--on-surface);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .release-name i {
      color: var(--primary);
    }

    .release-date {
      font-size: 0.8rem;
      color: var(--on-surface-variant);
    }

    .assets-list {
      display: none;
      margin-top: var(--spacing-md);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--outline-variant);
    }

    .assets-list.show {
      display: block;
    }

    .asset-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-sm);
      background: var(--surface-container-low);
      border-radius: var(--radius-md);
      border: 1px solid var(--outline-variant);
      transition: all var(--transition-duration) var(--transition-timing);
      flex-wrap: wrap;
      gap: var(--spacing-sm);
    }

    .asset-item:hover {
      border-color: var(--primary);
      box-shadow: var(--elevation-2);
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-weight: 500;
      color: var(--on-surface);
      font-size: 0.95rem;
      word-break: break-all;
    }

    .file-name i {
      color: var(--primary);
      margin-right: var(--spacing-sm);
    }

    .file-size {
      font-size: 0.8rem;
      color: var(--on-surface-variant);
      margin-top: var(--spacing-xs);
    }

    .file-actions {
      display: flex;
      gap: var(--spacing-sm);
      flex-shrink: 0;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-sm) var(--spacing-md);
      border-radius: var(--radius-full);
      border: none;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all var(--transition-duration) var(--transition-timing);
      white-space: nowrap;
    }

    .btn-download-normal {
      background: var(--surface-container-highest);
      color: var(--on-surface-variant);
      border: 1px solid var(--outline-variant);
    }

    .btn-download-normal:hover {
      background: var(--surface-container-high);
    }

    .btn-download-fast {
      background: var(--primary);
      color: var(--on-primary);
    }

    .btn-download-fast:hover {
      opacity: 0.9;
    }

    .btn-toggle-assets {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: var(--radius-full);
      border: 1px solid var(--outline-variant);
      background: var(--surface-container-low);
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: var(--spacing-sm);
      transition: all var(--transition-duration) var(--transition-timing);
    }

    .btn-toggle-assets:hover {
      background: var(--primary-container);
      border-color: var(--primary);
    }

    .highlight {
      background-color: rgba(0, 103, 192, 0.2);
      border-radius: 2px;
      padding: 0 2px;
    }

    /* ========== 无搜索结果 ========== */
    .no-results {
      text-align: center;
      padding: var(--spacing-xl);
      color: var(--on-surface-variant);
      display: none;
    }

    .no-results.show {
      display: block;
    }

    .no-results i {
      font-size: 3rem;
      margin-bottom: var(--spacing-md);
      color: var(--outline-variant);
    }

    /* ========== 讨论区 ========== */
    .discussion-section {
      margin-top: var(--spacing-lg);
    }

    .create-discussion {
      background: var(--surface-container-low);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
      border: 1px solid var(--outline-variant);
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
      border: 2px solid var(--outline-variant);
      border-radius: var(--radius-md);
      background: var(--surface);
      color: var(--on-surface);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color var(--transition-duration) var(--transition-timing);
      outline: none;
      resize: vertical;
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: var(--primary);
    }

    .btn-submit {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-md) var(--spacing-xl);
      border-radius: var(--radius-full);
      border: none;
      background: var(--primary);
      color: var(--on-primary);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: var(--elevation-1);
      transition: all var(--transition-duration) var(--transition-timing);
    }

    .btn-submit:hover {
      box-shadow: var(--elevation-3);
      opacity: 0.9;
    }

    .discussion-item {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
      border: 1px solid var(--outline-variant);
      transition: all var(--transition-duration) var(--transition-timing);
    }

    .discussion-item:hover {
      border-color: var(--primary);
    }

    .discussion-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-md);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-full);
      border: 2px solid var(--primary-container);
      object-fit: cover;
    }

    .discussion-author {
      font-weight: 500;
      color: var(--on-surface);
    }

    .discussion-date {
      font-size: 0.8rem;
      color: var(--on-surface-variant);
      margin-top: 2px;
    }

    .discussion-title {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--on-surface);
      margin-bottom: var(--spacing-sm);
    }

    .comment-markdown {
      line-height: 1.7;
      color: var(--on-surface-variant);
      font-size: 0.9rem;
    }

    .comment-markdown h1,
    .comment-markdown h2,
    .comment-markdown h3 {
      color: var(--on-surface);
      margin: var(--spacing-md) 0 var(--spacing-sm);
      font-weight: 500;
    }

    .comment-markdown p {
      margin-bottom: var(--spacing-sm);
    }

    .comment-markdown code {
      background: var(--surface-container-highest);
      padding: 2px 8px;
      border-radius: var(--radius-xs);
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.85rem;
    }

    .comment-markdown pre {
      background: var(--surface-container-highest);
      padding: var(--spacing-md);
      border-radius: var(--radius-md);
      overflow-x: auto;
      margin: var(--spacing-sm) 0;
    }

    .comment-markdown pre code {
      background: none;
      padding: 0;
    }

    /* 去掉 Markdown 链接下划线 */
    .comment-markdown a {
      color: var(--primary);
      font-weight: 500;
      text-decoration: none;
    }

    .comment-markdown a:hover {
      text-decoration: none;
      opacity: 0.8;
    }

    .comment-markdown blockquote {
      border-left: 4px solid var(--primary);
      padding-left: var(--spacing-md);
      margin: var(--spacing-sm) 0;
      color: var(--on-surface-variant);
    }

    .comment-markdown table {
      width: 100%;
      border-collapse: collapse;
      margin: var(--spacing-sm) 0;
    }

    .comment-markdown th,
    .comment-markdown td {
      padding: var(--spacing-sm);
      border: 1px solid var(--outline-variant);
      text-align: left;
    }

    .comment-markdown th {
      background: var(--surface-container-highest);
      font-weight: 500;
    }

    .btn-load-comments {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: var(--radius-full);
      border: 1px solid var(--outline-variant);
      background: var(--surface-container-low);
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: var(--spacing-sm);
      transition: all var(--transition-duration) var(--transition-timing);
    }

    .btn-load-comments:hover {
      background: var(--primary-container);
    }

    .comments-container {
      display: none;
      margin-top: var(--spacing-md);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--outline-variant);
    }

    .comments-container.show {
      display: block;
    }

    .comment-item {
      display: flex;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-sm);
      background: var(--surface-container-low);
      border-radius: var(--radius-md);
      border: 1px solid var(--outline-variant);
    }

    .comment-item .avatar {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    /* ========== 免责声明 ========== */
    .disclaimer {
      text-align: center;
      padding: var(--spacing-lg);
      background: var(--surface);
      border-radius: var(--radius-xl);
      color: var(--on-surface-variant);
      font-size: 0.85rem;
      margin-top: var(--spacing-lg);
      border: 1px solid var(--outline-variant);
      box-shadow: var(--elevation-1);
    }

    /* ========== 页脚 ========== */
    .footer {
      text-align: center;
      padding: var(--spacing-lg);
      color: var(--on-surface-variant);
      font-size: 0.85rem;
      margin-top: var(--spacing-lg);
    }

    /* ========== 加载动画 ========== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-md);
      padding: var(--spacing-xl);
      color: var(--on-surface-variant);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid var(--outline-variant);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ========== 响应式 ========== */
    @media (max-width: 640px) {
      .header h1 {
        font-size: 1.6rem;
      }

      .logo-icon {
        width: 52px;
        height: 52px;
      }

      .stats-bar {
        gap: var(--spacing-md);
        padding: var(--spacing-md);
      }

      .stat-value {
        font-size: 1.2rem;
      }

      .asset-item {
        flex-direction: column;
        align-items: stretch;
      }

      .file-actions {
        flex-direction: column;
      }

      .btn-download {
        justify-content: center;
      }

      .card {
        padding: var(--spacing-md);
      }

      .announcement-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .search-info {
        flex-direction: column;
        gap: var(--spacing-sm);
      }
    }

    /* ========== 通知提示 ========== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: var(--spacing-md) var(--spacing-lg);
      border-radius: var(--radius-md);
      background: var(--surface-container-highest);
      color: var(--on-surface);
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: var(--elevation-3);
      z-index: 10000;
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      animation: slideUp 0.3s ease-out;
    }

    .toast-success {
      border-left: 4px solid #0C7D60;
    }

    .toast-error {
      border-left: 4px solid var(--error);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* ========== 全局链接样式 ========== */
    a {
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <!-- 主题切换按钮 -->
  <div class="theme-switcher">
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
      <i class="fas fa-sun"></i>
      <i class="fas fa-moon"></i>
    </button>
  </div>

  <!-- 头部 -->
  <header class="header">
    <div class="logo-wrapper">
      <div class="logo-icon">
        <i class="fas fa-cloud"></i>
      </div>
    </div>
    <h1>POSC资源站</h1>
    <p class="subtitle">
      <i class="fab fa-github"></i>
      <span id="github-stars">0</span> stars · 
      <span id="github-forks">0</span> forks
    </p>
  </header>

  <!-- 统计栏 -->
  <div class="container">
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="release-count">0</div>
        <div class="stat-label">资源发布</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="file-count">0</div>
        <div class="stat-label">文件总数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="user-count">0</div>
        <div class="stat-label">Stars</div>
      </div>
    </div>

    <!-- 公告区域 -->
    <div class="announcement-card">
      <div class="announcement-header">
        <h2 class="announcement-title">
          <i class="fas fa-bullhorn"></i> 最新公告
        </h2>
        <button class="btn-refresh" onclick="fetchAnnouncement()">
          <i class="fas fa-sync-alt"></i> 刷新公告
        </button>
      </div>
      <div id="announcement-content">
        <div class="loading">
          <div class="spinner"></div> 加载公告中...
        </div>
      </div>
    </div>

    <!-- 文件发布 -->
    <div class="card">
      <h2 class="section-title">
        <i class="fas fa-box-open"></i> 文件发布
      </h2>
      
      <div class="search-wrapper">
        <input type="text" id="file-search" class="search-input" placeholder="搜索文件名...">
        <i class="fas fa-search search-icon"></i>
      </div>
      
      <div id="search-results-info" class="search-info">
        <span id="search-count">找到 0 个结果</span>
        <button class="btn-clear-search" onclick="clearSearch()">
          <i class="fas fa-times"></i> 清除搜索
        </button>
      </div>
      
      <div id="releases">
        <div class="loading">
          <div class="spinner"></div> 加载发布文件中...
        </div>
      </div>
      
      <div id="no-results" class="no-results">
        <i class="fas fa-search"></i>
        <h3>未找到匹配的文件</h3>
        <p>请尝试使用其他关键词搜索</p>
      </div>
    </div>

    <!-- 讨论区 -->
    <div class="card discussion-section">
      <h2 class="section-title">
        <i class="fas fa-comments"></i> 社区讨论
      </h2>
      
      <div class="create-discussion">
        <h3 style="font-weight: 500; margin-bottom: 16px; color: var(--on-surface);">
          <i class="fas fa-pen"></i> 新建讨论
        </h3>
        <input type="text" id="issueTitle" class="form-input" placeholder="输入讨论标题（必填）" required>
        <textarea id="issueBody" class="form-textarea" placeholder="输入讨论内容（支持Markdown格式）" rows="4"></textarea>
        <button onclick="createNewIssue()" class="btn-submit">
          <i class="fas fa-plus-circle"></i> 创建讨论
        </button>
      </div>
      
      <div id="discussions">
        <div class="loading">
          <div class="spinner"></div> 加载讨论中...
        </div>
      </div>
    </div>

    <!-- 免责声明 -->
    <div class="disclaimer">
      <strong><i class="fas fa-exclamation-circle"></i> 免责声明：</strong>
      本站所有资源均为来自于网络，不代表本站立场。下载内容仅供学习交流使用，不得用于商业用途。 
      一切后果由使用者自行承担，如需删除内容，请联系 wyxdlz54188
    </div>

    <!-- 页脚 -->
    <div class="footer">
      <p>&copy; 2025 POSC</p>
    </div>
  </div>

  <script>
    // ========== 主题切换 ==========
    function toggleTheme() {
      const currentTheme = document.body.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 
                        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.body.setAttribute('data-theme', savedTheme);
    }

    // ========== GitHub 统计 ==========
    async function fetchGitHubStats() {
      try {
        const response = await fetch('https://api.github.com/repos/penosext/Cloudpan');
        if (!response.ok) throw new Error('获取GitHub信息失败');
        const data = await response.json();
        document.getElementById('github-stars').textContent = data.stargazers_count;
        document.getElementById('github-forks').textContent = data.forks_count;
        document.getElementById('user-count').textContent = data.stargazers_count;
      } catch (error) {
        console.error('获取GitHub数据失败:', error);
        document.getElementById('github-stars').textContent = 'N/A';
        document.getElementById('github-forks').textContent = 'N/A';
        document.getElementById('user-count').textContent = 'N/A';
      }
    }

    // ========== 存储所有发布数据 ==========
    let allReleases = [];

    async function initialize() {
      initTheme();
      try {
        await Promise.all([
          fetchAnnouncement(),
          fetchReleases(),
          fetchDiscussions(),
          fetchGitHubStats()
        ]);
        initSearch();
      } catch (error) {
        showToast(`初始化失败: ${error.message}`, 'error');
      }
    }

    // ========== 搜索功能 ==========
    function initSearch() {
      const searchInput = document.getElementById('file-search');
      searchInput.addEventListener('input', debounce(handleSearch, 300));
    }

    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    function handleSearch(event) {
      const searchTerm = event.target.value.trim().toLowerCase();
      const resultsInfo = document.getElementById('search-results-info');
      const noResults = document.getElementById('no-results');
      
      if (searchTerm === '') {
        resultsInfo.classList.remove('show');
        noResults.classList.remove('show');
        renderReleases(allReleases);
        return;
      }
      
      resultsInfo.classList.add('show');
      let matchCount = 0;
      
      const filteredReleases = allReleases.map(release => {
        const filteredAssets = release.assets.filter(asset => 
          asset.name.toLowerCase().includes(searchTerm)
        );
        matchCount += filteredAssets.length;
        return { ...release, assets: filteredAssets };
      }).filter(release => release.assets.length > 0);
      
      document.getElementById('search-count').textContent = `找到 ${matchCount} 个结果`;
      renderReleases(filteredReleases, searchTerm);
      
      if (matchCount === 0) {
        noResults.classList.add('show');
      } else {
        noResults.classList.remove('show');
      }
    }

    function clearSearch() {
      document.getElementById('file-search').value = '';
      document.getElementById('search-results-info').classList.remove('show');
      document.getElementById('no-results').classList.remove('show');
      renderReleases(allReleases);
    }

    // ========== 公告获取 ==========
    async function fetchAnnouncement() {
      const contentDiv = document.getElementById('announcement-content');
      try {
        contentDiv.innerHTML = '<div class="loading"><div class="spinner"></div> 加载中...</div>';
        const response = await fetch('https://raw.githubusercontent.com/penosext/Cloudpan/main/notice.md');
        if (!response.ok) throw new Error(`HTTP错误! 状态码: ${response.status}`);
        const text = await response.text();
        const lastModified = response.headers.get('last-modified');
        const dateInfo = lastModified ? 
          `<div class="announcement-meta">
            <i class="far fa-clock"></i> 最后更新: ${new Date(lastModified).toLocaleDateString('zh-CN')}
          </div>` : '';
        
        contentDiv.innerHTML = `
          <div class="announcement-content">
            ${marked.parse(text || '暂无公告')}
            ${dateInfo}
          </div>
        `;
      } catch (error) {
        contentDiv.innerHTML = `
          <div style="text-align: center; padding: 24px; color: var(--error);">
            <i class="fas fa-exclamation-triangle"></i> ${escapeHtml(error.message)}
            <br><br>
            <button onclick="fetchAnnouncement()" class="btn-refresh" style="margin-top: 8px;">
              <i class="fas fa-redo"></i> 重试
            </button>
          </div>
        `;
      }
    }

    // ========== 文件发布获取 ==========
    async function fetchReleases() {
      try {
        const response = await fetch('https://api.github.com/repos/penosext/Cloudpan/releases');
        if (!response.ok) throw new Error('获取发布信息失败');
        const releases = await response.json();
        allReleases = releases;
        
        document.getElementById('release-count').textContent = releases.length;
        const totalFiles = releases.reduce((acc, release) => acc + release.assets.length, 0);
        document.getElementById('file-count').textContent = totalFiles;

        renderReleases(releases);
      } catch (error) {
        showToast(`文件加载失败: ${error.message}`, 'error');
      }
    }

    function renderReleases(releases, searchTerm = '') {
      const container = document.getElementById('releases');
      
      if (releases.length === 0 && searchTerm === '') {
        container.innerHTML = '<div class="loading"><div class="spinner"></div> 加载发布文件中...</div>';
        return;
      }
      
      container.innerHTML = releases.map(release => `
        <div class="release-item">
          <div class="release-header">
            <div class="release-name">
              <i class="fas fa-tag"></i> ${escapeHtml(release.name || release.tag_name)}
            </div>
            <div class="release-date">
              <i class="far fa-calendar-alt"></i> ${new Date(release.published_at).toLocaleDateString('zh-CN')}
            </div>
          </div>
          <div class="assets-list">
            ${release.assets.map(asset => {
              let fileName = escapeHtml(asset.name);
              if (searchTerm) {
                const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
                fileName = fileName.replace(regex, '<span class="highlight">$1</span>');
              }
              return `
                <div class="asset-item">
                  <div class="file-info">
                    <div class="file-name">
                      <i class="fas fa-file"></i> ${fileName}
                    </div>
                    <div class="file-size">
                      <i class="fas fa-database"></i> ${formatFileSize(asset.size)}
                    </div>
                  </div>
                  <div class="file-actions">
                    <a href="${asset.browser_download_url}" class="btn-download btn-download-normal" target="_blank">
                      <i class="fas fa-download"></i> 普通下载
                    </a>
                    <a href="${generateProxyUrl(asset.browser_download_url)}" class="btn-download btn-download-fast" target="_blank">
                      <i class="fas fa-bolt"></i> 高速下载
                    </a>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <button class="btn-toggle-assets" onclick="toggleAssets(this)">
            <i class="fas fa-layer-group"></i> 展开文件 (${release.assets.length})
          </button>
        </div>
      `).join('');
    }

    function toggleAssets(button) {
      const assetsList = button.previousElementSibling;
      assetsList.classList.toggle('show');
      const count = assetsList.querySelectorAll('.asset-item').length;
      button.innerHTML = assetsList.classList.contains('show') ?
        `<i class="fas fa-layer-group"></i> 收起文件 (${count})` :
        `<i class="fas fa-layer-group"></i> 展开文件 (${count})`;
    }

    // ========== 讨论区获取 ==========
    async function fetchDiscussions() {
      try {
        const response = await fetch('https://api.github.com/repos/penosext/Cloudpan/issues');
        const issues = await response.json();
        const container = document.getElementById('discussions');
        
        container.innerHTML = issues.map(issue => `
          <div class="discussion-item">
            <div class="discussion-header">
              <img src="${issue.user.avatar_url}" class="avatar" alt="${issue.user.login}">
              <div>
                <div class="discussion-author">${issue.user.login}</div>
                <div class="discussion-date">${new Date(issue.created_at).toLocaleString('zh-CN')}</div>
              </div>
            </div>
            <div class="discussion-title">
              <i class="fas fa-comment-dots"></i> ${escapeHtml(issue.title)}
            </div>
            <div class="comment-markdown">${marked.parse(issue.body || '无内容描述')}</div>
            <button class="btn-load-comments" onclick="loadComments(this, ${issue.number})">
              <i class="fas fa-comments"></i> 显示评论 (${issue.comments})
            </button>
            <div class="comments-container"></div>
          </div>
        `).join('');
      } catch (error) {
        console.error('获取讨论信息失败:', error);
        showToast('加载讨论失败，请稍后重试', 'error');
      }
    }

    // ========== 评论加载 ==========
    async function loadComments(button, issueNumber) {
      const container = button.nextElementSibling;
      if (container.children.length === 0) {
        try {
          button.disabled = true;
          button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 加载中...';
          
          const response = await fetch(`https://api.github.com/repos/penosext/Cloudpan/issues/${issueNumber}/comments`);
          const comments = await response.json();
          
          container.innerHTML = comments.map(comment => `
            <div class="comment-item">
              <img src="${comment.user.avatar_url}" class="avatar" alt="${comment.user.login}">
              <div>
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                  <span class="discussion-author">${comment.user.login}</span>
                  <span class="discussion-date">${new Date(comment.created_at).toLocaleString('zh-CN')}</span>
                </div>
                <div class="comment-markdown">${marked.parse(comment.body || '无评论内容')}</div>
              </div>
            </div>
          `).join('');
          
          button.innerHTML = `<i class="fas fa-comments"></i> 隐藏评论 (${comments.length})`;
        } catch (error) {
          console.error('获取评论失败:', error);
          container.innerHTML = '<div style="text-align: center; color: var(--error); padding: 16px;">无法加载评论</div>';
          button.innerHTML = `<i class="fas fa-comments"></i> 显示评论 (${issueNumber})`;
        } finally {
          button.disabled = false;
        }
      }
      container.classList.toggle('show');
    }

    // ========== 创建讨论 ==========
    function createNewIssue() {
      const titleInput = document.getElementById('issueTitle');
      const bodyInput = document.getElementById('issueBody');
      
      if (!titleInput.value.trim()) {
        titleInput.style.borderColor = 'var(--error)';
        titleInput.focus();
        setTimeout(() => titleInput.style.borderColor = '', 2000);
        showToast('请填写讨论标题', 'error');
        return;
      }

      const baseUrl = 'https://github.com/penosext/Cloudpan/issues/new';
      const params = new URLSearchParams({
        title: titleInput.value.trim(),
        body: bodyInput.value.trim(),
        labels: 'user-generated'
      });

      window.open(`${baseUrl}?${params.toString()}`, '_blank');
      titleInput.value = '';
      bodyInput.value = '';
      showToast('讨论创建成功！请在GitHub页面完成提交', 'success');
    }

    // ========== 工具函数 ==========
    function escapeHtml(unsafe) {
      return unsafe.toString()
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function generateProxyUrl(url) {
      return `https://ghproxy.net/${encodeURI(url)}`;
    }

    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const units = ['Bytes', 'KB', 'MB', 'GB'];
      const exp = Math.floor(Math.log(bytes) / Math.log(1024));
      return `${(bytes / Math.pow(1024, exp)).toFixed(2)} ${units[exp]}`;
    }

    function showToast(message, type = 'success') {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();

      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
        ${escapeHtml(message)}
      `;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 5000);
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
